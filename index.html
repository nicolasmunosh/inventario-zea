<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="contenedor">
      <p class="subtitulo">Control de materiales y stock</p>

      <input
        type="text"
        id="buscador"
        placeholder="Buscar producto..."
        oninput="mostrarProductos()"
        autocomplete="off"
      />

      <h1>Inventario</h1>

      <input
        type="text"
        id="nombreProducto"
        placeholder="Nombre del producto"
        autocomplete="off"
      />

      <input type="number" id="cantidadProducto" placeholder="Cantidad" />

      <button class="btn-agregar" onclick="agregarProducto()">
        Agregar Producto
      </button>

      <button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>

      <div id="listaProductos"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module" src="script.js"></script>
  </body>
</html>
